openapi: 3.0.3
info:
  title: Social Media API
  version: 1.0.0
  description: API documentation for the Social Media backend

servers:
  - url: http://localhost:3000

components:

  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: token

  schemas:

    RegisterRequest:
      type: object
      required:
        - username
        - email
        - password
      properties:
        username:
          type: string
          example: ashish
        email:
          type: string
          example: ashish@gmail.com
        password:
          type: string
          example: strongpassword123

    LoginRequest:
      type: object
      properties:
        username:
          type: string
          example: ashish
        email:
          type: string
          example: ashish@gmail.com
        password:
          type: string
          example: strongpassword123

    CreatePost:
      type: object
      required:
        - content
      properties:
        content:
          type: string
          example: Hello world

    CommentRequest:
      type: object
      required:
        - text
      properties:
        text:
          type: string
          example: Nice post!

paths:

# ---------------- AUTH ----------------

  /auth/register:
    post:
      summary: Register new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        200:
          description: User created successfully
        500:
          description: Server error

  /auth/login:
    post:
      summary: Login user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        200:
          description: Login successful
        401:
          description: Invalid credentials

# ---------------- POSTS ----------------

  /posts/create:
    post:
      summary: Create a post
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePost'
      responses:
        200:
          description: Post created

  /posts/explore:
    get:
      summary: Get latest posts
      responses:
        200:
          description: Explore posts

  /posts/personalFeed:
    get:
      summary: Get personal feed from followed users
      security:
        - cookieAuth: []
      responses:
        200:
          description: Personal feed posts

  /posts/{id}:
    get:
      summary: Get posts of a specific user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        200:
          description: List of posts

  /posts/like/{id}:
    post:
      summary: Like or unlike a post
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        200:
          description: Post updated

  /posts/comment/{id}:
    post:
      summary: Add comment to post
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CommentRequest'
      responses:
        200:
          description: Comment added

# ---------------- CONNECTION ----------------

  /connection/send/{id}:
    post:
      summary: Send follow request
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        200:
          description: Request sent

  /connection/accept/{id}:
    post:
      summary: Accept follow request
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string

  /connection/reject/{id}:
    post:
      summary: Reject follow request
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string

  /connection/withdraw/{id}:
    post:
      summary: Withdraw follow request
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string

  /connection/remove/{id}:
    post:
      summary: Remove follower
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string

  /connection/unfollow/{id}:
    post:
      summary: Unfollow user
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string

  /connection/myfollower:
    get:
      summary: Get list of followers
      security:
        - cookieAuth: []
      responses:
        200:
          description: Followers list

  /connection/myfollowing:
    get:
      summary: Get list of users you follow
      security:
        - cookieAuth: []
      responses:
        200:
          description: Following list